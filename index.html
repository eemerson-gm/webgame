<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #10131a;
        color: #f5f7fb;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .page {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        padding: 1.25rem;
      }

      h1 {
        font-size: clamp(1rem, 2vw, 1.5rem);
        font-weight: 700;
        color: #c9ced8;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .game-frame {
        width: min(1280px, 100%);
        aspect-ratio: 16 / 9;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 0.25rem;
        overflow: hidden;
        background: #05070b;
        box-shadow: 0 1.5rem 4rem rgba(0, 0, 0, 0.45);
        position: relative;
      }

      #game {
        width: 100%;
        height: 100%;
        display: block;
        image-rendering: pixelated;
        outline: none;
      }

      .player-list {
        width: min(1280px, 100%);
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        padding: 0.75rem;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 0.25rem;
        background: rgba(5, 7, 11, 0.72);
        color: #f5f7fb;
        font-size: 0.875rem;
      }

      .player-list__title {
        color: #9aa3b5;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .player-list__rows {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }

      .player-list__row {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
      }

      .player-list__ping {
        color: #9ff3b3;
        font-variant-numeric: tabular-nums;
      }

      .main-menu {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        padding: 1rem;
        background: rgba(5, 7, 11, 0.88);
        color: #f5f7fb;
      }

      .main-menu[hidden] {
        display: none;
      }

      .main-menu__panel {
        width: min(28rem, 100%);
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        padding: 1rem;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 0.25rem;
        background: rgba(16, 19, 26, 0.94);
      }

      .main-menu__actions,
      .world-card {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.75rem;
      }

      .world-list {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .world-card {
        padding: 0.75rem;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 0.25rem;
        background: rgba(5, 7, 11, 0.72);
      }

      .world-card__name {
        font-weight: 700;
      }

      .world-card__count,
      .main-menu__status {
        color: #9aa3b5;
        font-size: 0.8rem;
      }

      button {
        padding: 0.45rem 0.7rem;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 0.25rem;
        background: #2a6ff0;
        color: #ffffff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.55;
        cursor: default;
      }
    </style>
    <title>Block Game</title>
  </head>
  <body>
    <main class="page">
      <h1>Block Game</h1>
      <div class="game-frame">
        <canvas id="game"></canvas>
        <section id="main-menu" class="main-menu" aria-label="Worlds">
          <div class="main-menu__panel">
            <div class="main-menu__actions">
              <div>
                <h2>Choose World</h2>
                <p id="main-menu-status" class="main-menu__status">Connecting...</p>
              </div>
              <button id="create-world" type="button">Create World</button>
            </div>
            <div id="world-list" class="world-list"></div>
          </div>
        </section>
      </div>
      <section class="player-list" aria-label="Players">
        <div class="player-list__title">Players</div>
        <div id="player-list" class="player-list__rows"></div>
      </section>
    </main>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
