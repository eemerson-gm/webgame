<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Animation Editor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: monospace;
    font-size: 13px;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }
  #asset-browser {
    width: 220px;
    min-width: 220px;
    background: #16213e;
    border-right: 1px solid #0f3460;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  h2, h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #8888aa;
  }
  #asset-browser h2 {
    padding: 10px;
    border-bottom: 1px solid #0f3460;
    flex-shrink: 0;
  }
  #asset-search {
    margin: 8px;
    padding: 4px 6px;
    background: #0f3460;
    border: 1px solid #1a4a80;
    color: #e0e0e0;
    font-family: monospace;
    font-size: 12px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  #asset-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px;
    display: flex;
    flex-wrap: wrap;
    align-content: flex-start;
    gap: 4px;
  }
  .asset-thumb {
    width: 40px;
    height: 40px;
    background: #0a0a1a;
    border: 1px solid #0f3460;
    border-radius: 3px;
    cursor: grab;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .asset-thumb:hover { border-color: #e94560; }
  .asset-thumb.selected { border-color: #53d8fb; }
  .asset-thumb img {
    image-rendering: pixelated;
    max-width: 32px;
    max-height: 32px;
  }
  #selected-asset {
    padding: 8px;
    border-top: 1px solid #0f3460;
    color: #8888aa;
    font-size: 11px;
    min-height: 31px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #toolbar {
    background: #16213e;
    border-bottom: 1px solid #0f3460;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  label { color: #aaa; font-size: 11px; }
  select, input[type=number], input[type=text] {
    background: #0f3460;
    border: 1px solid #1a4a80;
    color: #e0e0e0;
    font-family: monospace;
    font-size: 12px;
    padding: 3px 6px;
    border-radius: 3px;
  }
  #anim-select, #track-select { min-width: 180px; }
  #save-status {
    margin-left: auto;
    font-size: 11px;
    color: #8888aa;
    min-width: 60px;
    text-align: right;
  }
  #save-status.saved { color: #4caf50; }
  #save-status.error { color: #e94560; }
  #canvas-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #0a0a1a;
    position: relative;
  }
  #preview {
    image-rendering: pixelated;
    cursor: crosshair;
    position: relative;
    z-index: 1;
  }
  #controls {
    background: #16213e;
    border-top: 1px solid #0f3460;
    padding: 10px 16px;
    display: flex;
    gap: 16px;
    align-items: stretch;
    flex-shrink: 0;
    flex-wrap: wrap;
    max-height: 260px;
    overflow-y: auto;
  }
  .panel {
    min-width: 170px;
    background: #101b35;
    border: 1px solid #0f3460;
    border-radius: 4px;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .ctrl-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ctrl-row label { width: 42px; }
  .ctrl-row input[type=number] { width: 70px; }
  input[type=range] {
    width: 140px;
    accent-color: #e94560;
  }
  .val-label {
    font-size: 11px;
    color: #aaa;
    width: 46px;
  }
  .btn {
    background: #0f3460;
    border: 1px solid #1a4a80;
    color: #e0e0e0;
    font-family: monospace;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 3px;
    cursor: pointer;
  }
  .btn:hover { background: #1a4a80; }
  .btn.active { background: #e94560; border-color: #e94560; }
  .btn.danger { border-color: #783044; color: #ffb5c2; }
  #attachment-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 115px;
    overflow-y: auto;
  }
  .attachment-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    align-items: center;
    padding: 4px 6px;
    background: #0f3460;
    border: 1px solid #1a4a80;
    border-radius: 3px;
    cursor: pointer;
  }
  .attachment-row.selected { border-color: #53d8fb; }
  .muted {
    color: #8888aa;
    font-size: 11px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }
</style>
</head>
<body>
<aside id="asset-browser">
  <h2>Assets</h2>
  <input id="asset-search" type="text" placeholder="filter..." />
  <div id="asset-list"></div>
  <div id="selected-asset">Selected asset: none</div>
</aside>
<section id="main">
  <div id="toolbar">
    <label>Animation</label>
    <select id="anim-select"><option value="">loading</option></select>
    <label>Track</label>
    <select id="track-select"></select>
    <button class="btn" id="btn-prev">Prev</button>
    <span id="frame-label" style="min-width:60px;text-align:center;font-size:12px;">Frame 1/1</span>
    <button class="btn" id="btn-next">Next</button>
    <button class="btn" id="btn-play">Play</button>
    <label>Duration</label>
    <input type="number" id="frame-dur" style="width:60px;" min="1" step="1" value="75" />
    <span style="font-size:11px;color:#666">ms</span>
    <button class="btn" id="btn-save">Save</button>
    <span id="save-status"></span>
  </div>
  <div id="canvas-area">
    <canvas id="preview"></canvas>
  </div>
  <div id="controls">
    <div class="panel">
      <h3>Character Sprite</h3>
      <button class="btn" id="set-body-sprite">Use Selected Asset</button>
      <div class="muted" id="body-sprite-label">Sprite: none</div>
    </div>
    <div class="panel">
      <h3>Hat Placement</h3>
      <label class="ctrl-row" style="width:auto;">
        <input type="checkbox" id="hat-visible" />
        Show placeholder hat
      </label>
      <button class="btn" id="select-hat">Select Hat</button>
      <div class="muted">Sprite preview: MinerHat</div>
    </div>
    <div class="panel">
      <h3>Attachments</h3>
      <button class="btn" id="add-attachment">Add Selected Asset</button>
      <div id="attachment-list"></div>
      <button class="btn danger" id="remove-attachment">Remove Selected</button>
    </div>
    <div class="panel">
      <h3>Selected Item</h3>
      <div class="muted" id="selected-item-label">None</div>
      <div class="ctrl-row">
        <label>X</label>
        <input type="number" id="off-x" step="1" />
      </div>
      <div class="ctrl-row">
        <label>Y</label>
        <input type="number" id="off-y" step="1" />
      </div>
      <div class="ctrl-row">
        <label>Layer</label>
        <input type="number" id="layer" step="1" />
      </div>
      <div class="ctrl-row">
        <label>Rot</label>
        <input type="range" id="rot-slider" min="-3.15" max="3.15" step="0.01" value="0" />
        <span class="val-label" id="rot-label">0.00</span>
      </div>
      <div class="ctrl-row">
        <label>Exact</label>
        <input type="number" id="rot-exact" step="0.01" />
      </div>
    </div>
  </div>
</section>
<script>
const RESOURCE_MAP = {
  Player: "assets/player/player.png",
  PlayerWalk1: "assets/player/player_walk1.png",
  PlayerWalk2: "assets/player/player_walk2.png",
  PlayerJump: "assets/player/player_jump.png",
  PlayerCrouch: "assets/player/player_crouch.png",
  PlayerUseTool1: "assets/player/player_use_tool1.png",
  PlayerUseTool2: "assets/player/player_use_tool2.png",
  PlayerUseTool3: "assets/player/player_use_tool3.png",
  PlayerUseTool4: "assets/player/player_use_tool4.png",
  PlayerUseTool5: "assets/player/player_use_tool5.png",
  PlayerPunch1: "assets/player/player_punch1.png",
  PlayerPunch2: "assets/player/player_punch2.png",
  PlayerPunch3: "assets/player/player_punch3.png",
  BronzePickaxe: "assets/tools/bronze_pickaxe.png",
  Slime: "assets/mobs/slime.png",
  BlockBreak1: "assets/effects/block_break1.png",
  BlockBreak2: "assets/effects/block_break2.png",
  BlockBreak3: "assets/effects/block_break3.png",
  BlockBreak4: "assets/effects/block_break4.png",
  Smash1: "assets/effects/smash_1.png",
  Smash2: "assets/effects/smash_2.png",
  Smash3: "assets/effects/smash_3.png",
  Smash4: "assets/effects/smash_4.png",
  HeartFull: "assets/ui/heart_full.png",
  HeartHalf: "assets/ui/heart_half.png",
  HeartEmpty: "assets/ui/heart_empty.png",
  NonePowerupIcon: "assets/powerups/none_powerup_icon.png",
  MinerPowerupIcon: "assets/powerups/miner_powerup_icon.png",
  MinerPowerup: "assets/powerups/miner_powerup.png",
  MinerPowerupItem: "assets/items/miner_powerup.png",
  MinerHat: "assets/powerups/miner_powerup_hat.png",
  PowerupSlot: "assets/ui/powerup_slot.png",
  InventoryBlockSlot: "assets/ui/inventory_block_slot.png",
  ThoughtBubbleSleep: "assets/ui/thought_bubble_sleep.png",
  Grass: "assets/blocks/grass.png",
  Dirt: "assets/blocks/dirt.png",
  Lamp: "assets/blocks/block.png",
  PillarBottom: "assets/blocks/pillar_bottom.png",
  PillarMiddle: "assets/blocks/pillar_middle.png",
  PillarTop: "assets/blocks/pillar_top.png",
  Spawn: "assets/blocks/spawn.png",
  SpawnOrb: "assets/blocks/spawn_orb.png",
  SpawnOrb1: "assets/blocks/spawn_orb1.png",
  SpawnOrb2: "assets/blocks/spawn_orb2.png",
  SpawnOrb3: "assets/blocks/spawn_orb3.png",
  SpawnOrb4: "assets/blocks/spawn_orb4.png",
  SpawnOrb5: "assets/blocks/spawn_orb5.png",
  SpawnOrb6: "assets/blocks/spawn_orb6.png",
  SpawnOrb7: "assets/blocks/spawn_orb7.png",
  SpawnOrb8: "assets/blocks/spawn_orb8.png",
  Stone: "assets/blocks/stone.png",
  WhiteWool: "assets/blocks/white_wool.png",
  Bedrock: "assets/blocks/bedrock.png",
};
const PATH_TO_KEY = Object.fromEntries(Object.entries(RESOURCE_MAP).map(([key, value]) => [value, key]));
const SCALE = 8;
const TILE = 16;
const WORKSPACE_TILES = 8;
const CANVAS_PX = WORKSPACE_TILES * TILE * SCALE;
const CENTER_OFFSET = (WORKSPACE_TILES * TILE) / 2;
const canvas = document.getElementById("preview");
canvas.width = CANVAS_PX;
canvas.height = CANVAS_PX;
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;
const state = {
  animData: null,
  frameIndex: 0,
  playTimer: null,
  undoHistory: [],
  undoIndex: -1,
  selectedAssetPath: "",
  selectedAssetKey: "",
  selectedItem: { type: "body" },
  renderItems: [],
  isDragging: false,
  dragStartCanvasX: 0,
  dragStartCanvasY: 0,
  dragStartOffsetX: 0,
  dragStartOffsetY: 0,
  allAssets: [],
};
const elements = {
  animSelect: document.getElementById("anim-select"),
  trackSelect: document.getElementById("track-select"),
  frameLabel: document.getElementById("frame-label"),
  frameDur: document.getElementById("frame-dur"),
  saveStatus: document.getElementById("save-status"),
  assetList: document.getElementById("asset-list"),
  assetSearch: document.getElementById("asset-search"),
  selectedAsset: document.getElementById("selected-asset"),
  attachmentList: document.getElementById("attachment-list"),
  bodySpriteLabel: document.getElementById("body-sprite-label"),
  hatVisible: document.getElementById("hat-visible"),
  selectedItemLabel: document.getElementById("selected-item-label"),
  offX: document.getElementById("off-x"),
  offY: document.getElementById("off-y"),
  layer: document.getElementById("layer"),
  rotSlider: document.getElementById("rot-slider"),
  rotExact: document.getElementById("rot-exact"),
  rotLabel: document.getElementById("rot-label"),
};
const spriteUrl = (key) => RESOURCE_MAP[key] ?? key;
const assetKeyFor = (assetPath) => PATH_TO_KEY[assetPath] ?? assetPath;
const selectedAttachment = () => {
  if (state.selectedItem.type !== "attachment") return undefined;
  return currentAttachments().find((attachment) => attachment.id === state.selectedItem.id);
};
const currentTrackEntry = () => trackEntries().find((entry) => entry.id === elements.trackSelect.value) ?? trackEntries()[0];
const currentTrack = () => currentTrackEntry()?.track;
const currentFrame = () => currentTrack()?.frames?.[state.frameIndex];
const currentAttachments = () => currentTrackEntry()?.attachments?.() ?? [];
const currentHatPoses = () => currentTrackEntry()?.hatPoses?.() ?? [];
const currentHatPose = () => currentHatPoses()[state.frameIndex];
const attachmentPose = (attachment) => attachment.poses[state.frameIndex] ?? attachment.poses[0];
const makePose = () => ({ offset: { x: 0, y: 0 }, rotation: 0 });
const makeHatPose = () => ({ offset: { x: 0, y: 5 } });
const makeTrack = (frames, frameDurationMs) => ({ frames, frameDurationMs });
const defaultBody = () => ({
  idle: makeTrack([{ sprite: "Player" }], 120),
  jump: makeTrack([{ sprite: "PlayerJump" }], 120),
  crouch: makeTrack([{ sprite: "PlayerCrouch" }], 120),
  walk: makeTrack([{ sprite: "PlayerWalk1" }, { sprite: "PlayerWalk2" }], 120),
});
const ensurePoseCount = (poses, count, factory) => Array.from({ length: count }, (_, index) => poses?.[index] ?? poses?.[0] ?? factory());
const ensureAnimationData = (data) => {
  const body = data.body ?? defaultBody();
  const legacyAction = data.action;
  const actions = data.actions ?? {
    blockBreak: legacyAction
      ? {
          frames: legacyAction.frames ?? [],
          frameDurationMs: legacyAction.frameDurationMs ?? 75,
          attachments: legacyAction.attachment
            ? [{
                id: "tool",
                sprite: legacyAction.attachment.sprite,
                layer: 1,
                poses: legacyAction.attachment.poses ?? [],
              }]
            : [],
        }
      : makeTrack([{ sprite: "PlayerPunch1" }, { sprite: "PlayerPunch2" }, { sprite: "PlayerPunch3" }], 75),
  };
  data.body = body;
  data.actions = actions;
  delete data.action;
  data.hat = data.hat ?? { poses: {} };
  data.hat.poses = data.hat.poses ?? {};
  ["idle", "jump", "crouch", "walk"].forEach((trackId) => {
    data.body[trackId] = data.body[trackId] ?? defaultBody()[trackId];
    data.body[trackId].frames = data.body[trackId].frames?.length ? data.body[trackId].frames : defaultBody()[trackId].frames;
    data.body[trackId].frameDurationMs = data.body[trackId].frameDurationMs ?? 120;
    data.hat.poses[trackId] = ensurePoseCount(data.hat.poses[trackId], data.body[trackId].frames.length, makeHatPose);
  });
  data.hat.poses.actions = data.hat.poses.actions ?? {};
  Object.entries(data.actions).forEach(([actionId, action]) => {
    action.frames = action.frames?.length ? action.frames : [{ sprite: "PlayerPunch1" }];
    action.frameDurationMs = action.frameDurationMs ?? 75;
    action.attachments = action.attachments ?? [];
    action.attachments.forEach((attachment) => {
      attachment.id = attachment.id || uniqueAttachmentId();
      attachment.layer = Number.isFinite(Number(attachment.layer)) ? Number(attachment.layer) : 1;
      attachment.poses = ensurePoseCount(attachment.poses, action.frames.length, makePose);
    });
    data.hat.poses.actions[actionId] = ensurePoseCount(data.hat.poses.actions[actionId], action.frames.length, makeHatPose);
  });
  return data;
};
const trackEntries = () => {
  if (!state.animData) return [];
  const bodyEntries = ["idle", "walk", "jump", "crouch"].map((trackId) => ({
    id: `body.${trackId}`,
    label: trackId,
    track: state.animData.body[trackId],
    hatPoses: () => state.animData.hat.poses[trackId],
    attachments: () => [],
  }));
  const actionEntries = Object.entries(state.animData.actions).map(([actionId, action]) => ({
    id: `actions.${actionId}`,
    label: actionId,
    track: action,
    hatPoses: () => state.animData.hat.poses.actions[actionId],
    attachments: () => action.attachments,
  }));
  return [...bodyEntries, ...actionEntries];
};
const loadImg = (() => {
  const cache = {};
  return (src) => {
    if (!cache[src]) {
      const img = new Image();
      img.src = src;
      img.onload = render;
      cache[src] = img;
    }
    return cache[src];
  };
})();
const captureState = () => {
  if (!state.animData) return;
  if (state.undoIndex < state.undoHistory.length - 1) {
    state.undoHistory = state.undoHistory.slice(0, state.undoIndex + 1);
  }
  state.undoHistory.push(JSON.parse(JSON.stringify(state.animData)));
  if (state.undoHistory.length > 50) {
    state.undoHistory.shift();
    return;
  }
  state.undoIndex += 1;
};
const performUndo = () => {
  if (state.undoIndex <= 0 || state.undoHistory.length === 0) return;
  state.undoIndex -= 1;
  state.animData = ensureAnimationData(JSON.parse(JSON.stringify(state.undoHistory[state.undoIndex])));
  syncTrackSelect();
  syncControls();
  render();
};
const setTrack = (trackId) => {
  elements.trackSelect.value = trackId;
  state.frameIndex = 0;
  state.selectedItem = { type: "body" };
  stopPlay();
  syncControls();
  render();
};
const goToFrame = (index) => {
  const count = currentTrack()?.frames?.length ?? 1;
  state.frameIndex = ((index % count) + count) % count;
  syncControls();
  render();
};
const stopPlay = () => {
  clearInterval(state.playTimer);
  state.playTimer = null;
  document.getElementById("btn-play").textContent = "Play";
  document.getElementById("btn-play").classList.remove("active");
};
const syncTrackSelect = () => {
  const previous = elements.trackSelect.value;
  elements.trackSelect.innerHTML = "";
  trackEntries().forEach((entry) => {
    const option = document.createElement("option");
    option.value = entry.id;
    option.textContent = entry.label;
    elements.trackSelect.appendChild(option);
  });
  elements.trackSelect.value = trackEntries().some((entry) => entry.id === previous) ? previous : trackEntries()[0]?.id ?? "";
};
const syncControls = () => {
  const track = currentTrack();
  const frame = currentFrame();
  const frameCount = track?.frames?.length ?? 0;
  elements.frameLabel.textContent = `Frame ${Math.min(state.frameIndex + 1, frameCount)}/${frameCount || 1}`;
  elements.frameDur.value = track?.frameDurationMs ?? 75;
  elements.bodySpriteLabel.textContent = `Sprite: ${frame?.sprite ?? "none"}`;
  const hatPose = currentHatPose();
  elements.hatVisible.checked = !!hatPose && hatPose.visible !== false;
  const attachment = selectedAttachment();
  const pose = selectedPose();
  elements.selectedItemLabel.textContent = selectedItemLabel();
  elements.offX.value = pose ? pose.offset.x : "";
  elements.offY.value = pose ? pose.offset.y : "";
  elements.layer.value = attachment ? attachment.layer : "";
  elements.layer.disabled = !attachment;
  const rotation = attachment && pose ? pose.rotation ?? 0 : 0;
  elements.rotSlider.value = rotation;
  elements.rotExact.value = attachment && pose ? rotation.toFixed(3) : "";
  elements.rotLabel.textContent = attachment && pose ? rotation.toFixed(2) : "-";
  elements.rotSlider.disabled = !attachment;
  elements.rotExact.disabled = !attachment;
  renderAttachmentList();
};
const selectedPose = () => {
  if (state.selectedItem.type === "hat") return currentHatPose();
  const attachment = selectedAttachment();
  if (attachment) return attachmentPose(attachment);
  return undefined;
};
const selectedItemLabel = () => {
  if (state.selectedItem.type === "hat") return "Hat";
  const attachment = selectedAttachment();
  if (attachment) return `Attachment: ${attachment.sprite}`;
  return "Body frame";
};
const renderAttachmentList = () => {
  elements.attachmentList.innerHTML = "";
  currentAttachments().forEach((attachment) => {
    const row = document.createElement("div");
    const name = document.createElement("span");
    const layer = document.createElement("span");
    row.className = `attachment-row${state.selectedItem.type === "attachment" && state.selectedItem.id === attachment.id ? " selected" : ""}`;
    name.textContent = attachment.sprite;
    layer.textContent = attachment.layer;
    row.appendChild(name);
    row.appendChild(layer);
    row.onclick = () => {
      state.selectedItem = { type: "attachment", id: attachment.id };
      syncControls();
      render();
    };
    elements.attachmentList.appendChild(row);
  });
};
const selectAsset = (assetPath) => {
  state.selectedAssetPath = assetPath;
  state.selectedAssetKey = assetKeyFor(assetPath);
  elements.selectedAsset.textContent = `Selected asset: ${state.selectedAssetKey}`;
  renderAssets(elements.assetSearch.value);
};
const clearSelectedAsset = () => {
  state.selectedAssetPath = "";
  state.selectedAssetKey = "";
  elements.selectedAsset.textContent = "Selected asset: none";
  renderAssets(elements.assetSearch.value);
};
const renderAssets = (filter) => {
  const query = filter.toLowerCase();
  elements.assetList.innerHTML = "";
  state.allAssets
    .filter((assetPath) => assetPath.toLowerCase().includes(query))
    .forEach((assetPath) => {
      const div = document.createElement("div");
      const img = document.createElement("img");
      const key = assetKeyFor(assetPath);
      div.className = `asset-thumb${state.selectedAssetPath === assetPath ? " selected" : ""}`;
      div.title = key;
      img.src = `/${assetPath}`;
      img.alt = key;
      div.appendChild(img);
      div.onclick = () => {
        selectAsset(assetPath);
      };
      elements.assetList.appendChild(div);
    });
};
const setBodyFrameSprite = (assetPath) => {
  const frame = currentFrame();
  if (!frame) return;
  captureState();
  frame.sprite = assetKeyFor(assetPath);
  syncControls();
  render();
};
const replaceAttachmentSprite = (attachment, assetPath) => {
  captureState();
  attachment.sprite = assetKeyFor(assetPath);
  syncControls();
  render();
};
const uniqueAttachmentId = () => `attachment-${Date.now()}-${Math.round(Math.random() * 10000)}`;
const addAttachmentFromAsset = (assetPath) => {
  const trackEntry = currentTrackEntry();
  if (!trackEntry?.id.startsWith("actions.")) return;
  captureState();
  const attachment = {
    id: uniqueAttachmentId(),
    sprite: assetKeyFor(assetPath),
    layer: 1,
    poses: ensurePoseCount([], currentTrack().frames.length, makePose),
  };
  currentAttachments().push(attachment);
  state.selectedItem = { type: "attachment", id: attachment.id };
  syncControls();
  render();
};
const removeSelectedAttachment = () => {
  const attachment = selectedAttachment();
  const action = currentTrack();
  if (!attachment || !action?.attachments) return;
  captureState();
  action.attachments = action.attachments.filter((item) => item.id !== attachment.id);
  state.selectedItem = { type: "body" };
  syncControls();
  render();
};
const canvasToPixel = (clientX, clientY) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const canvasX = (clientX - rect.left) * scaleX;
  const canvasY = (clientY - rect.top) * scaleY;
  return {
    px: (canvasX / SCALE) - CENTER_OFFSET,
    py: (canvasY / SCALE) - CENTER_OFFSET,
  };
};
const drawWorkspace = () => {
  ctx.fillStyle = "#0a0a1a";
  ctx.fillRect(0, 0, CANVAS_PX, CANVAS_PX);
  const pixelCount = WORKSPACE_TILES * TILE;
  Array.from({ length: pixelCount }).forEach((_, row) => {
    Array.from({ length: pixelCount }).forEach((__, col) => {
      ctx.fillStyle = (row + col) % 2 === 0 ? "#1a1a2e" : "#141428";
      ctx.fillRect(col * SCALE, row * SCALE, SCALE, SCALE);
    });
  });
};
const drawBody = () => {
  const frame = currentFrame();
  if (!frame?.sprite) return;
  const img = loadImg(spriteUrl(frame.sprite));
  if (!img.complete || img.naturalWidth <= 0) return;
  const centerX = CENTER_OFFSET * SCALE;
  const centerY = CENTER_OFFSET * SCALE;
  ctx.drawImage(img, centerX, centerY, img.naturalWidth * SCALE, img.naturalHeight * SCALE);
};
const sortedAttachments = () => [...currentAttachments()].sort((a, b) => a.layer - b.layer);
const drawAttachment = (attachment) => {
  const pose = attachmentPose(attachment);
  if (!pose || pose.visible === false) return;
  const img = loadImg(spriteUrl(attachment.sprite));
  if (!img.complete || img.naturalWidth <= 0) return;
  const x = (CENTER_OFFSET + pose.offset.x) * SCALE;
  const y = (CENTER_OFFSET + pose.offset.y) * SCALE;
  const width = img.naturalWidth * SCALE;
  const height = img.naturalHeight * SCALE;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(pose.rotation ?? 0);
  ctx.drawImage(img, 0, -height, width, height);
  ctx.restore();
  state.renderItems.push({
    type: "attachment",
    id: attachment.id,
    x: pose.offset.x,
    y: pose.offset.y,
    width: img.naturalWidth,
    height: img.naturalHeight,
    rotation: pose.rotation ?? 0,
    anchor: "bottom-left",
  });
};
const drawHat = () => {
  const pose = currentHatPose();
  if (!pose || pose.visible === false) return;
  const img = loadImg(spriteUrl("MinerHat"));
  if (!img.complete || img.naturalWidth <= 0) return;
  const x = (CENTER_OFFSET + TILE / 2 + pose.offset.x) * SCALE;
  const y = (CENTER_OFFSET + pose.offset.y) * SCALE;
  const width = img.naturalWidth * SCALE;
  const height = img.naturalHeight * SCALE;
  ctx.drawImage(img, x - width / 2, y - height, width, height);
  state.renderItems.push({
    type: "hat",
    x: TILE / 2 + pose.offset.x,
    y: pose.offset.y,
    width: img.naturalWidth,
    height: img.naturalHeight,
    rotation: 0,
    anchor: "bottom-center",
  });
};
const drawSelection = () => {
  const item = state.renderItems.find((renderItem) => {
    if (state.selectedItem.type === "hat") return renderItem.type === "hat";
    return renderItem.type === "attachment" && renderItem.id === state.selectedItem.id;
  });
  if (!item) return;
  const x = (CENTER_OFFSET + item.x) * SCALE;
  const y = (CENTER_OFFSET + item.y) * SCALE;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(item.rotation);
  ctx.strokeStyle = "#53d8fb";
  ctx.lineWidth = 2;
  if (item.anchor === "bottom-center") {
    ctx.strokeRect((-item.width * SCALE) / 2, -item.height * SCALE, item.width * SCALE, item.height * SCALE);
  }
  if (item.anchor === "bottom-left") {
    ctx.strokeRect(0, -item.height * SCALE, item.width * SCALE, item.height * SCALE);
  }
  ctx.fillStyle = "#53d8fb";
  ctx.beginPath();
  ctx.arc(0, 0, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
};
const drawCrosshair = () => {
  const centerX = CENTER_OFFSET * SCALE;
  const centerY = CENTER_OFFSET * SCALE;
  ctx.strokeStyle = "rgba(255,255,255,0.2)";
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  ctx.moveTo(centerX, 0);
  ctx.lineTo(centerX, CANVAS_PX);
  ctx.moveTo(0, centerY);
  ctx.lineTo(CANVAS_PX, centerY);
  ctx.stroke();
  ctx.setLineDash([]);
};
const render = () => {
  state.renderItems = [];
  drawWorkspace();
  if (!state.animData) return;
  sortedAttachments().filter((attachment) => attachment.layer < 0).forEach(drawAttachment);
  drawBody();
  sortedAttachments().filter((attachment) => attachment.layer >= 0).forEach(drawAttachment);
  drawHat();
  drawSelection();
  drawCrosshair();
};
const hitTestItem = (item, px, py) => {
  const dx = px - item.x;
  const dy = py - item.y;
  const cos = Math.cos(-item.rotation);
  const sin = Math.sin(-item.rotation);
  const localX = dx * cos - dy * sin;
  const localY = dx * sin + dy * cos;
  if (item.anchor === "bottom-center") {
    return localX >= -item.width / 2 && localX <= item.width / 2 && localY >= -item.height && localY <= 0;
  }
  return localX >= 0 && localX <= item.width && localY >= -item.height && localY <= 0;
};
const hitTestScene = (px, py) => [...state.renderItems].reverse().find((item) => hitTestItem(item, px, py));
canvas.addEventListener("mousedown", (event) => {
  const { px, py } = canvasToPixel(event.clientX, event.clientY);
  const hit = hitTestScene(px, py);
  if (!hit) {
    state.selectedItem = { type: "body" };
    clearSelectedAsset();
    syncControls();
    render();
    return;
  }
  state.selectedItem = hit.type === "attachment" ? { type: "attachment", id: hit.id } : { type: "hat" };
  const pose = selectedPose();
  if (!pose) {
    syncControls();
    render();
    return;
  }
  captureState();
  state.isDragging = true;
  state.dragStartCanvasX = px;
  state.dragStartCanvasY = py;
  state.dragStartOffsetX = pose.offset.x;
  state.dragStartOffsetY = pose.offset.y;
  syncControls();
  render();
  event.preventDefault();
});
window.addEventListener("mousemove", (event) => {
  if (!state.isDragging) return;
  const pose = selectedPose();
  if (!pose) return;
  const { px, py } = canvasToPixel(event.clientX, event.clientY);
  pose.offset.x = Math.round(state.dragStartOffsetX + px - state.dragStartCanvasX);
  pose.offset.y = Math.round(state.dragStartOffsetY + py - state.dragStartCanvasY);
  syncControls();
  render();
});
window.addEventListener("mouseup", () => {
  state.isDragging = false;
});
const applySelectedPoseChange = () => {
  const pose = selectedPose();
  if (!pose) return;
  pose.offset.x = parseFloat(elements.offX.value) || 0;
  pose.offset.y = parseFloat(elements.offY.value) || 0;
  const attachment = selectedAttachment();
  if (attachment) {
    const rotation = parseFloat(elements.rotExact.value) || 0;
    attachment.layer = parseInt(elements.layer.value) || 0;
    pose.rotation = rotation;
    elements.rotSlider.value = rotation;
    elements.rotLabel.textContent = rotation.toFixed(2);
  }
  render();
  renderAttachmentList();
};
["offX", "offY", "layer", "rotExact"].forEach((key) => {
  elements[key].onfocus = captureState;
  elements[key].oninput = applySelectedPoseChange;
});
elements.rotSlider.onmousedown = captureState;
elements.rotSlider.oninput = () => {
  const attachment = selectedAttachment();
  const pose = selectedPose();
  if (!attachment || !pose) return;
  const rotation = parseFloat(elements.rotSlider.value);
  pose.rotation = rotation;
  elements.rotExact.value = rotation.toFixed(3);
  elements.rotLabel.textContent = rotation.toFixed(2);
  render();
};
elements.hatVisible.onchange = () => {
  const poses = currentHatPoses();
  if (!poses[state.frameIndex]) {
    poses[state.frameIndex] = makeHatPose();
  }
  captureState();
  poses[state.frameIndex].visible = elements.hatVisible.checked;
  state.selectedItem = { type: "hat" };
  syncControls();
  render();
};
document.getElementById("select-hat").onclick = () => {
  state.selectedItem = { type: "hat" };
  syncControls();
  render();
};
elements.frameDur.onfocus = captureState;
elements.frameDur.oninput = () => {
  const track = currentTrack();
  if (!track) return;
  track.frameDurationMs = parseInt(elements.frameDur.value) || 75;
  if (!state.playTimer) return;
  stopPlay();
  document.getElementById("btn-play").click();
};
document.getElementById("btn-prev").onclick = () => goToFrame(state.frameIndex - 1);
document.getElementById("btn-next").onclick = () => goToFrame(state.frameIndex + 1);
document.getElementById("btn-play").onclick = () => {
  if (state.playTimer) {
    stopPlay();
    return;
  }
  document.getElementById("btn-play").textContent = "Pause";
  document.getElementById("btn-play").classList.add("active");
  state.playTimer = setInterval(() => goToFrame(state.frameIndex + 1), currentTrack()?.frameDurationMs ?? 75);
};
elements.trackSelect.onchange = () => setTrack(elements.trackSelect.value);
elements.assetSearch.oninput = () => renderAssets(elements.assetSearch.value);
document.getElementById("set-body-sprite").onclick = () => {
  if (!state.selectedAssetPath) return;
  setBodyFrameSprite(state.selectedAssetPath);
};
document.getElementById("add-attachment").onclick = () => {
  if (!state.selectedAssetPath) return;
  addAttachmentFromAsset(state.selectedAssetPath);
};
document.getElementById("remove-attachment").onclick = removeSelectedAttachment;
const doSave = async () => {
  if (!state.animData) return;
  elements.saveStatus.className = "";
  elements.saveStatus.textContent = "Saving...";
  try {
    const res = await fetch("/api/save", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id: state.animData.id, data: state.animData }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    elements.saveStatus.className = "saved";
    elements.saveStatus.textContent = "Saved";
    setTimeout(() => {
      elements.saveStatus.textContent = "";
    }, 2000);
  } catch (error) {
    elements.saveStatus.className = "error";
    elements.saveStatus.textContent = "Error";
    console.error(error);
  }
};
document.getElementById("btn-save").onclick = doSave;
const loadAnimation = async (id) => {
  if (!id) {
    state.animData = null;
    syncTrackSelect();
    syncControls();
    render();
    return;
  }
  const response = await fetch(`/api/animations/${id}`);
  state.animData = ensureAnimationData(await response.json());
  state.frameIndex = 0;
  state.selectedItem = { type: "body" };
  stopPlay();
  state.undoHistory = [JSON.parse(JSON.stringify(state.animData))];
  state.undoIndex = 0;
  syncTrackSelect();
  syncControls();
  render();
};
elements.animSelect.onchange = () => loadAnimation(elements.animSelect.value);
fetch("/api/animations")
  .then((response) => response.json())
  .then((list) => {
    elements.animSelect.innerHTML = '<option value="">select</option>';
    list.forEach(({ id }) => {
      const option = document.createElement("option");
      option.value = id;
      option.textContent = id;
      elements.animSelect.appendChild(option);
    });
    if (list.length === 1) {
      elements.animSelect.value = list[0].id;
      loadAnimation(list[0].id);
    }
  });
fetch("/api/assets")
  .then((response) => response.json())
  .then((list) => {
    state.allAssets = list;
    renderAssets("");
  });
window.addEventListener("keydown", (event) => {
  if ((event.ctrlKey || event.metaKey) && event.key === "z") {
    event.preventDefault();
    performUndo();
  }
});
</script>
</body>
</html>
