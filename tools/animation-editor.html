<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Animation Editor</title>
<link rel="stylesheet" href="editor-ui/editor-ui.css" />
</head>
<body class="editor-root">
<aside class="editor-sidebar" aria-label="Asset palette">
  <h2 class="editor-sidebar__title">Sprite palette</h2>
  <input id="asset-search" class="editor-input editor-input--search" type="search" placeholder="Filter assets…" autocomplete="off" />
  <div id="asset-list" class="editor-asset-list"></div>
  <div id="selected-asset" class="editor-sidebar__footer">Selected: none</div>
</aside>
<section class="editor-main" aria-label="Animation editor">
  <header id="toolbar" class="editor-toolbar">
    <span class="editor-toolbar__field">
      <span class="editor-label">Animation</span>
      <select id="anim-select" class="editor-select editor-select--wide" aria-label="Load animation file">
        <option value="">Loading…</option>
      </select>
      <button type="button" class="editor-btn editor-btn--compact" id="btn-new-anim" aria-label="Create new animation file">New</button>
    </span>
    <span class="editor-toolbar__field">
      <span class="editor-label">Clip</span>
      <select id="track-select" class="editor-select editor-select--wide" aria-label="Body or action clip"></select>
      <button type="button" class="editor-btn editor-btn--compact" id="btn-new-body-clip" aria-label="Add body clip" title="Body clip (locomotion)">+ Body</button>
      <button type="button" class="editor-btn editor-btn--compact" id="btn-new-action-clip" aria-label="Add action clip" title="Action clip (attachments)">+ Action</button>
    </span>
    <button type="button" class="editor-btn" id="btn-prev" aria-label="Previous frame">Prev</button>
    <span id="frame-label" class="editor-frame-label" aria-live="polite">Frame 1/1</span>
    <button type="button" class="editor-btn" id="btn-next" aria-label="Next frame">Next</button>
    <button type="button" class="editor-btn" id="btn-play" aria-pressed="false" aria-label="Play or pause">Play</button>
    <span class="editor-toolbar__field">
      <span class="editor-label">Duration</span>
      <input type="number" id="frame-dur" class="editor-input editor-input--narrow" min="1" step="1" value="75" aria-label="Frame duration milliseconds" />
    </span>
    <span class="editor-hint">ms</span>
    <span class="editor-toolbar__field" id="damage-field">
      <span class="editor-label">Damage</span>
      <input type="number" id="base-damage" class="editor-input editor-input--narrow" min="0" step="0.1" value="1" aria-label="Base damage" />
    </span>
    <button type="button" class="editor-btn editor-btn--primary" id="btn-save">Save</button>
    <span id="save-status" class="editor-toolbar__save-status" role="status" aria-live="polite"></span>
  </header>
  <div class="editor-scene">
    <div id="canvas-area" class="editor-canvas-area">
      <canvas id="preview" class="editor-canvas" role="img" aria-label="Current frame preview: drag attachments from the palette, or move hat and attachments"></canvas>
    </div>
    <div class="editor-track-panel" aria-label="Tracks">
      <div class="editor-track-panel__toolbar">
        <span class="editor-track-panel__title">Tracks</span>
        <span id="attachment-hint" class="editor-muted editor-track-panel__hint"></span>
        <span class="editor-track-panel__actions">
          <button type="button" class="editor-btn editor-btn--compact" id="add-attachment">Add from palette</button>
          <button type="button" class="editor-btn editor-btn--compact editor-btn--danger" id="remove-attachment">Remove</button>
        </span>
      </div>
      <div class="editor-track-panel__toolbar" id="hitbox-toolbar">
        <span class="editor-track-panel__title">Hitboxes</span>
        <span id="hitbox-hint" class="editor-muted editor-track-panel__hint"></span>
        <span class="editor-track-panel__actions">
          <button type="button" class="editor-btn editor-btn--compact" id="add-hitbox">Add hitbox</button>
          <button type="button" class="editor-btn editor-btn--compact" id="copy-hitbox">Copy</button>
          <button type="button" class="editor-btn editor-btn--compact" id="paste-hitbox">Paste</button>
          <button type="button" class="editor-btn editor-btn--compact editor-btn--danger" id="remove-hitbox">Remove</button>
        </span>
      </div>
      <div class="editor-track-stack">
        <div id="track-row-player" class="editor-track-row">
          <span class="editor-track-row__badge">Player</span>
          <div class="editor-track-row__body">
            <span class="editor-muted" id="body-sprite-label">Sprite: none</span>
            <button type="button" class="editor-btn editor-btn--compact" id="set-body-sprite">Apply palette</button>
          </div>
        </div>
        <div id="track-row-hat" class="editor-track-row">
          <span class="editor-track-row__badge">Hat</span>
          <div class="editor-track-row__body">
            <label class="editor-track-row__check">
              <input type="checkbox" id="hat-visible" />
              <span class="editor-muted">Visible</span>
            </label>
            <button type="button" class="editor-btn editor-btn--compact" id="select-hat">Focus</button>
          </div>
        </div>
        <div id="attachment-tracks" class="editor-track-stack-attachments" aria-label="Attachment tracks"></div>
        <div id="hitbox-tracks" class="editor-track-stack-attachments" aria-label="Hitbox tracks"></div>
      </div>
    </div>
  </div>
  <div id="controls" class="editor-properties" aria-label="Transform">
    <span class="editor-properties__label">Transform</span>
    <span id="selected-item-label" class="editor-properties__target editor-muted">None</span>
    <div class="editor-properties__fields">
      <span class="editor-toolbar__field">
        <span class="editor-label">X</span>
        <input type="number" id="off-x" class="editor-input" step="1" />
      </span>
      <span class="editor-toolbar__field">
        <span class="editor-label">Y</span>
        <input type="number" id="off-y" class="editor-input" step="1" />
      </span>
      <span class="editor-toolbar__field" id="hitbox-id-field">
        <span class="editor-label">ID</span>
        <input type="text" id="hitbox-id" class="editor-input editor-input--narrow" aria-label="Hitbox strike id" />
      </span>
      <span class="editor-toolbar__field" id="width-field">
        <span class="editor-label">Width</span>
        <input type="number" id="hitbox-width" class="editor-input" step="1" min="1" />
      </span>
      <span class="editor-toolbar__field" id="height-field">
        <span class="editor-label">Height</span>
        <input type="number" id="hitbox-height" class="editor-input" step="1" min="1" />
      </span>
      <span class="editor-toolbar__field">
        <span class="editor-label">Layer</span>
        <input type="number" id="layer" class="editor-input" step="1" />
      </span>
      <span class="editor-toolbar__field editor-toolbar__field--grow">
        <span class="editor-label">Rot</span>
        <input type="range" id="rot-slider" class="editor-range" min="-3.15" max="3.15" step="0.01" value="0" />
        <span class="editor-val-label" id="rot-label">0.00</span>
      </span>
      <span class="editor-toolbar__field">
        <span class="editor-label">Exact</span>
        <input type="number" id="rot-exact" class="editor-input" step="0.01" />
      </span>
    </div>
  </div>
</section>
<script>
const RESOURCE_MAP = {
  Player: "assets/player/player.png",
  PlayerWalk1: "assets/player/player_walk1.png",
  PlayerWalk2: "assets/player/player_walk2.png",
  PlayerJump: "assets/player/player_jump.png",
  PlayerCrouch: "assets/player/player_crouch.png",
  PlayerUseTool1: "assets/player/player_use_tool1.png",
  PlayerUseTool2: "assets/player/player_use_tool2.png",
  PlayerUseTool3: "assets/player/player_use_tool3.png",
  PlayerUseTool4: "assets/player/player_use_tool4.png",
  PlayerUseTool5: "assets/player/player_use_tool5.png",
  PlayerPunch1: "assets/player/player_punch1.png",
  PlayerPunch2: "assets/player/player_punch2.png",
  PlayerPunch3: "assets/player/player_punch3.png",
  BronzePickaxe: "assets/tools/bronze_pickaxe.png",
  Slime: "assets/mobs/slime.png",
  BlockBreak1: "assets/effects/block_break1.png",
  BlockBreak2: "assets/effects/block_break2.png",
  BlockBreak3: "assets/effects/block_break3.png",
  BlockBreak4: "assets/effects/block_break4.png",
  Smash1: "assets/effects/smash_1.png",
  Smash2: "assets/effects/smash_2.png",
  Smash3: "assets/effects/smash_3.png",
  Smash4: "assets/effects/smash_4.png",
  HeartFull: "assets/ui/heart_full.png",
  HeartHalf: "assets/ui/heart_half.png",
  HeartEmpty: "assets/ui/heart_empty.png",
  NonePowerupIcon: "assets/powerups/none_powerup_icon.png",
  MinerPowerupIcon: "assets/powerups/miner_powerup_icon.png",
  MinerPowerup: "assets/powerups/miner_powerup.png",
  MinerPowerupItem: "assets/items/miner_powerup.png",
  MinerHat: "assets/powerups/miner_powerup_hat.png",
  PowerupSlot: "assets/ui/powerup_slot.png",
  InventoryBlockSlot: "assets/ui/inventory_block_slot.png",
  ThoughtBubbleSleep: "assets/ui/thought_bubble_sleep.png",
  Grass: "assets/blocks/grass.png",
  Dirt: "assets/blocks/dirt.png",
  Lamp: "assets/blocks/block.png",
  PillarBottom: "assets/blocks/pillar_bottom.png",
  PillarMiddle: "assets/blocks/pillar_middle.png",
  PillarTop: "assets/blocks/pillar_top.png",
  Spawn: "assets/blocks/spawn.png",
  SpawnOrb: "assets/blocks/spawn_orb.png",
  SpawnOrb1: "assets/blocks/spawn_orb1.png",
  SpawnOrb2: "assets/blocks/spawn_orb2.png",
  SpawnOrb3: "assets/blocks/spawn_orb3.png",
  SpawnOrb4: "assets/blocks/spawn_orb4.png",
  SpawnOrb5: "assets/blocks/spawn_orb5.png",
  SpawnOrb6: "assets/blocks/spawn_orb6.png",
  SpawnOrb7: "assets/blocks/spawn_orb7.png",
  SpawnOrb8: "assets/blocks/spawn_orb8.png",
  Stone: "assets/blocks/stone.png",
  WhiteWool: "assets/blocks/white_wool.png",
  Bedrock: "assets/blocks/bedrock.png",
};
const PATH_TO_KEY = Object.fromEntries(Object.entries(RESOURCE_MAP).map(([key, value]) => [value, key]));
const SCALE = 8;
const TILE = 16;
const WORKSPACE_TILES = 8;
const CANVAS_PX = WORKSPACE_TILES * TILE * SCALE;
const CENTER_OFFSET = (WORKSPACE_TILES * TILE) / 2;
const canvas = document.getElementById("preview");
const canvasArea = document.getElementById("canvas-area");
const ctx = canvas.getContext("2d");
canvas.width = CANVAS_PX;
canvas.height = CANVAS_PX;
ctx.imageSmoothingEnabled = false;
const btnPlay = document.getElementById("btn-play");
const state = {
  animData: null,
  frameIndex: 0,
  playTimer: null,
  undoHistory: [],
  undoIndex: -1,
  selectedAssetPath: "",
  selectedAssetKey: "",
  selectedItem: { type: "body" },
  renderItems: [],
  isDragging: false,
  dragPointerId: null,
  dragStartCanvasX: 0,
  dragStartCanvasY: 0,
  dragStartOffsetX: 0,
  dragStartOffsetY: 0,
  allAssets: [],
  copiedHitbox: null,
};
const elements = {
  animSelect: document.getElementById("anim-select"),
  trackSelect: document.getElementById("track-select"),
  frameLabel: document.getElementById("frame-label"),
  frameDur: document.getElementById("frame-dur"),
  baseDamage: document.getElementById("base-damage"),
  damageField: document.getElementById("damage-field"),
  saveStatus: document.getElementById("save-status"),
  assetList: document.getElementById("asset-list"),
  assetSearch: document.getElementById("asset-search"),
  selectedAsset: document.getElementById("selected-asset"),
  attachmentTracks: document.getElementById("attachment-tracks"),
  hitboxTracks: document.getElementById("hitbox-tracks"),
  hitboxToolbar: document.getElementById("hitbox-toolbar"),
  hitboxHint: document.getElementById("hitbox-hint"),
  addHitbox: document.getElementById("add-hitbox"),
  copyHitbox: document.getElementById("copy-hitbox"),
  pasteHitbox: document.getElementById("paste-hitbox"),
  removeHitbox: document.getElementById("remove-hitbox"),
  trackRowPlayer: document.getElementById("track-row-player"),
  trackRowHat: document.getElementById("track-row-hat"),
  attachmentHint: document.getElementById("attachment-hint"),
  addAttachment: document.getElementById("add-attachment"),
  removeAttachment: document.getElementById("remove-attachment"),
  bodySpriteLabel: document.getElementById("body-sprite-label"),
  hatVisible: document.getElementById("hat-visible"),
  selectedItemLabel: document.getElementById("selected-item-label"),
  offX: document.getElementById("off-x"),
  offY: document.getElementById("off-y"),
  hitboxId: document.getElementById("hitbox-id"),
  hitboxIdField: document.getElementById("hitbox-id-field"),
  hitboxWidth: document.getElementById("hitbox-width"),
  hitboxHeight: document.getElementById("hitbox-height"),
  widthField: document.getElementById("width-field"),
  heightField: document.getElementById("height-field"),
  layer: document.getElementById("layer"),
  rotSlider: document.getElementById("rot-slider"),
  rotExact: document.getElementById("rot-exact"),
  rotLabel: document.getElementById("rot-label"),
};
elements.trackRowPlayer.addEventListener("click", (event) => {
  if (event.target.closest("button")) return;
  state.selectedItem = { type: "body" };
  syncControls();
  render();
});
elements.trackRowHat.addEventListener("click", (event) => {
  if (event.target.closest("button") || event.target.closest("input") || event.target.closest("label")) return;
  state.selectedItem = { type: "hat" };
  syncControls();
  render();
});
const spriteUrl = (key) => RESOURCE_MAP[key] ?? key;
const assetKeyFor = (assetPath) => PATH_TO_KEY[assetPath] ?? assetPath;
const makePose = () => ({ offset: { x: 0, y: 0 }, rotation: 0 });
const makeHiddenAttachmentPose = () => ({ offset: { x: 0, y: 0 }, rotation: 0, visible: false });
const posesForSingleVisibleFrame = (frameCount, visibleFrameIndex, buildVisiblePose) =>
  Array.from({ length: frameCount }, (_, index) =>
    index === visibleFrameIndex ? buildVisiblePose() : makeHiddenAttachmentPose(),
  );
const makeHatPose = () => ({ offset: { x: 0, y: 5 } });
const makeTrack = (frames, frameDurationMs) => ({ frames, frameDurationMs });
const defaultBody = () => ({
  idle: makeTrack([{ sprite: "Player" }], 120),
  jump: makeTrack([{ sprite: "PlayerJump" }], 120),
  crouch: makeTrack([{ sprite: "PlayerCrouch" }], 120),
  walk: makeTrack([{ sprite: "PlayerWalk1" }, { sprite: "PlayerWalk2" }], 120),
});
const CORE_BODY_CLIPS = ["idle", "walk", "jump", "crouch"];
const ensurePoseCount = (poses, count, factory) => Array.from({ length: count }, (_, index) => poses?.[index] ?? poses?.[0] ?? factory());
const uniqueAttachmentId = () => `attachment-${Date.now()}-${Math.round(Math.random() * 10000)}`;
const uniqueHitboxId = () => `hitbox-${Date.now()}-${Math.round(Math.random() * 10000)}`;
const hitboxIdFromInput = (raw) => {
  const trimmed = raw.trim();
  if (!trimmed) return null;
  if (/^-?\d+$/.test(trimmed)) return Number(trimmed);
  return trimmed;
};
const nextNumericHitboxId = () => {
  const ids = Object.values(state.animData?.actions ?? {})
    .flatMap((action) => action.hitboxes ?? [])
    .flatMap((frameHitboxes) => frameHitboxes)
    .map((hitbox) => Number(hitbox.id))
    .filter((id) => Number.isInteger(id));
  return ids.length ? Math.max(...ids) + 1 : 1;
};
const ensureAnimationData = (data) => {
  const body = data.body ?? defaultBody();
  const legacyAction = data.action;
  const actions = data.actions ?? {
    blockBreak: legacyAction
      ? {
          frames: legacyAction.frames ?? [],
          frameDurationMs: legacyAction.frameDurationMs ?? 75,
          attachments: legacyAction.attachment
            ? [{
                id: "tool",
                sprite: legacyAction.attachment.sprite,
                layer: 1,
                poses: legacyAction.attachment.poses ?? [],
              }]
            : [],
        }
      : makeTrack([{ sprite: "PlayerPunch1" }, { sprite: "PlayerPunch2" }, { sprite: "PlayerPunch3" }], 75),
  };
  data.body = body;
  data.actions = actions;
  delete data.action;
  data.hat = data.hat ?? { poses: {} };
  data.hat.poses = data.hat.poses ?? {};
  const bodyKeys = [...new Set([...CORE_BODY_CLIPS, ...Object.keys(body)])];
  bodyKeys.forEach((trackId) => {
    data.body[trackId] = data.body[trackId] ?? defaultBody()[trackId] ?? makeTrack([{ sprite: "Player" }], 120);
    const fallbackFrames = defaultBody()[trackId]?.frames ?? [{ sprite: "Player" }];
    data.body[trackId].frames = data.body[trackId].frames?.length ? data.body[trackId].frames : fallbackFrames;
    data.body[trackId].frameDurationMs = data.body[trackId].frameDurationMs ?? 120;
    data.hat.poses[trackId] = ensurePoseCount(data.hat.poses[trackId], data.body[trackId].frames.length, makeHatPose);
  });
  data.hat.poses.actions = data.hat.poses.actions ?? {};
  Object.entries(data.actions).forEach(([actionId, action]) => {
    action.frames = action.frames?.length ? action.frames : [{ sprite: "PlayerPunch1" }];
    action.frameDurationMs = action.frameDurationMs ?? 75;
    action.baseDamage = Number.isFinite(Number(action.baseDamage)) ? Number(action.baseDamage) : 1;
    action.hitboxes = action.hitboxes ?? [];
    while (action.hitboxes.length < action.frames.length) {
      action.hitboxes.push([]);
    }
    action.hitboxes = action.hitboxes.slice(0, action.frames.length);
    action.hitboxes.forEach((frameHitboxes) => {
      frameHitboxes.forEach((hitbox) => {
        hitbox.id = hitbox.id === undefined || hitbox.id === null || hitbox.id === "" ? uniqueHitboxId() : hitbox.id;
        hitbox.offset = hitbox.offset ?? { x: 0, y: 0 };
        hitbox.width = Number.isFinite(Number(hitbox.width)) ? Number(hitbox.width) : 16;
        hitbox.height = Number.isFinite(Number(hitbox.height)) ? Number(hitbox.height) : 16;
      });
    });
    action.attachments = action.attachments ?? [];
    action.attachments.forEach((attachment) => {
      attachment.id = attachment.id || uniqueAttachmentId();
      attachment.layer = Number.isFinite(Number(attachment.layer)) ? Number(attachment.layer) : 1;
      attachment.poses = ensurePoseCount(attachment.poses, action.frames.length, makePose);
    });
    data.hat.poses.actions[actionId] = ensurePoseCount(data.hat.poses.actions[actionId], action.frames.length, makeHatPose);
  });
  return data;
};
const trackEntries = () => {
  if (!state.animData) return [];
  const extraBody = Object.keys(state.animData.body).filter((id) => !CORE_BODY_CLIPS.includes(id));
  extraBody.sort();
  const bodyTrackIds = [...CORE_BODY_CLIPS, ...extraBody];
  const bodyEntries = bodyTrackIds.map((trackId) => ({
    id: `body.${trackId}`,
    label: trackId,
    track: state.animData.body[trackId],
    hatPoses: () => state.animData.hat.poses[trackId],
    attachments: () => [],
  }));
  const actionEntries = Object.entries(state.animData.actions).map(([actionId, action]) => ({
    id: `actions.${actionId}`,
    label: actionId,
    track: action,
    hatPoses: () => state.animData.hat.poses.actions[actionId],
    attachments: () => action.attachments,
  }));
  return [...bodyEntries, ...actionEntries];
};
const currentTrackEntry = () => trackEntries().find((entry) => entry.id === elements.trackSelect.value) ?? trackEntries()[0];
const currentTrack = () => currentTrackEntry()?.track;
const currentFrame = () => currentTrack()?.frames?.[state.frameIndex];
const currentAttachments = () => currentTrackEntry()?.attachments?.() ?? [];
const currentHitboxes = () => {
  const track = currentTrack();
  if (!track || !isActionTrack() || !track.hitboxes) return [];
  return track.hitboxes[state.frameIndex] ?? [];
};
const currentHatPoses = () => currentTrackEntry()?.hatPoses?.() ?? [];
const currentHatPose = () => currentHatPoses()[state.frameIndex];
const attachmentPose = (attachment) => attachment.poses[state.frameIndex] ?? attachment.poses[0];
const revealAttachmentPoseIfHidden = (pose) => {
  if (!pose) return;
  if (pose.visible === false) delete pose.visible;
};
const selectedAttachment = () => {
  if (state.selectedItem.type !== "attachment") return undefined;
  return currentAttachments().find((attachment) => attachment.id === state.selectedItem.id);
};
const selectedHitbox = () => {
  if (state.selectedItem.type !== "hitbox") return undefined;
  return currentHitboxes().find((hitbox) => String(hitbox.id) === String(state.selectedItem.id));
};
const selectedPose = () => {
  if (state.selectedItem.type === "hat") return currentHatPose();
  const attachment = selectedAttachment();
  if (attachment) return attachmentPose(attachment);
  const hitbox = selectedHitbox();
  if (hitbox) return hitbox;
  return undefined;
};
const selectedItemLabel = () => {
  if (state.selectedItem.type === "hat") return "Hat";
  const attachment = selectedAttachment();
  if (attachment) return `Attachment: ${attachment.sprite}`;
  const hitbox = selectedHitbox();
  if (hitbox) return `Hitbox ${hitbox.id}: ${hitbox.width}x${hitbox.height}`;
  return "Body frame";
};
const captureState = () => {
  if (!state.animData) return;
  if (state.undoIndex < state.undoHistory.length - 1) {
    state.undoHistory = state.undoHistory.slice(0, state.undoIndex + 1);
  }
  state.undoHistory.push(JSON.parse(JSON.stringify(state.animData)));
  if (state.undoHistory.length > 50) {
    state.undoHistory.shift();
    return;
  }
  state.undoIndex += 1;
};
const performUndo = () => {
  if (state.undoIndex <= 0 || state.undoHistory.length === 0) return;
  state.undoIndex -= 1;
  state.animData = ensureAnimationData(JSON.parse(JSON.stringify(state.undoHistory[state.undoIndex])));
  syncTrackSelect();
  syncControls();
  render();
};
const stopPlay = () => {
  clearInterval(state.playTimer);
  state.playTimer = null;
  btnPlay.textContent = "Play";
  btnPlay.classList.remove("editor-btn--active");
  btnPlay.setAttribute("aria-pressed", "false");
};
const syncTrackSelect = (preferredClipId) => {
  const previous = preferredClipId !== undefined && preferredClipId !== null ? preferredClipId : elements.trackSelect.value;
  elements.trackSelect.innerHTML = "";
  trackEntries().forEach((entry) => {
    const option = document.createElement("option");
    option.value = entry.id;
    option.textContent = entry.label;
    elements.trackSelect.appendChild(option);
  });
  elements.trackSelect.value = trackEntries().some((entry) => entry.id === previous) ? previous : trackEntries()[0]?.id ?? "";
};
const syncTrackRowHighlight = () => {
  elements.trackRowPlayer.classList.toggle("editor-track-row--active", state.selectedItem.type === "body");
  elements.trackRowHat.classList.toggle("editor-track-row--active", state.selectedItem.type === "hat");
};
const renderAttachmentTracks = () => {
  elements.attachmentTracks.innerHTML = "";
  if (!isActionTrack()) return;
  currentAttachments().forEach((attachment) => {
    const row = document.createElement("div");
    row.className = `editor-track-row editor-track-row--attachment${state.selectedItem.type === "attachment" && state.selectedItem.id === attachment.id ? " editor-track-row--active" : ""}`;
    row.dataset.attachmentId = attachment.id;
    const badge = document.createElement("span");
    badge.className = "editor-track-row__badge";
    badge.textContent = "Prop";
    const body = document.createElement("div");
    body.className = "editor-track-row__body";
    const name = document.createElement("span");
    name.className = "editor-muted editor-track-row__name";
    name.textContent = attachment.sprite;
    const layer = document.createElement("span");
    layer.className = "editor-muted editor-track-row__meta";
    layer.textContent = `layer ${attachment.layer}`;
    body.appendChild(name);
    body.appendChild(layer);
    row.appendChild(badge);
    row.appendChild(body);
    row.onclick = () => {
      state.selectedItem = { type: "attachment", id: attachment.id };
      syncControls();
      render();
    };
    elements.attachmentTracks.appendChild(row);
  });
};
const syncAttachmentToolbar = () => {
  if (!state.animData) {
    elements.addAttachment.disabled = true;
    elements.removeAttachment.disabled = true;
    elements.attachmentHint.textContent = "";
    return;

  btnPlay.textContent = "Pause";
  btnPlay.classList.add("editor-btn--active");
  btnPlay.setAttribute("aria-pressed", "true");
  state.playTimer = setInterval(() => goToFrame(state.frameIndex + 1), currentTrack()?.frameDurationMs ?? 75);
};
elements.trackSelect.onchange = () => setTrack(elements.trackSelect.value);
elements.assetSearch.oninput = () => renderAssets(elements.assetSearch.value);
document.getElementById("set-body-sprite").onclick = () => {
  if (!state.selectedAssetPath) return;
  setBodyFrameSprite(state.selectedAssetPath);
};
elements.addAttachment.onclick = () => {
  if (!state.selectedAssetPath) return;
  addAttachmentFromAsset(state.selectedAssetPath);
};
elements.removeAttachment.onclick = removeSelectedAttachment;
elements.addHitbox.onclick = addHitbox;
elements.copyHitbox.onclick = copySelectedHitbox;
elements.pasteHitbox.onclick = pasteHitbox;
elements.removeHitbox.onclick = removeSelectedHitbox;
const fetchAnimList = () => fetch("/api/animations").then((response) => response.json());
const flashError = (msg) => {
  elements.saveStatus.textContent = msg;
  elements.saveStatus.classList.remove("editor-save-status--saved");
  elements.saveStatus.classList.add("editor-save-status--error");
  setTimeout(() => {
    elements.saveStatus.textContent = "";
    elements.saveStatus.classList.remove("editor-save-status--error");
  }, 3800);
};
const sanitizeAnimationId = (raw) => {
  const t = raw.trim().toLowerCase().replace(/\s+/g, "-").replace(/[^a-z0-9-]/g, "");
  if (!/^[a-z0-9]+(?:-[a-z0-9]+)*$/.test(t)) return "";
  return t;
};
const sanitizeBodyClipId = (raw) => {
  const t = raw.trim().toLowerCase().replace(/\s+/g, "");
  if (!/^[a-z][a-z0-9]*$/.test(t)) return "";
  return t;
};
const sanitizeActionClipId = (raw) => {
  const t = raw.trim().replace(/\s+/g, "");
  if (!/^[a-zA-Z][a-zA-Z0-9]*$/.test(t)) return "";
  return t;
};
const populateAnimSelectKeeping = async (selectId) => {
  const list = await fetchAnimList();
  elements.animSelect.innerHTML = '<option value="">Select…</option>';
  list.forEach(({ id }) => {
    const option = document.createElement("option");
    option.value = id;
    option.textContent = id;
    elements.animSelect.appendChild(option);
  });
  if (selectId && list.some((item) => item.id === selectId)) {
    elements.animSelect.value = selectId;
  }
};
const createNewAnimation = async () => {
  const raw = window.prompt("New animation id (file name, e.g. my-powerup)", "");
  if (raw === null) return;
  const id = sanitizeAnimationId(raw);
  if (!id) {
    flashError("Invalid id: use lowercase letters, numbers, and hyphens");
    return;
  }
  const list = await fetchAnimList();
  if (list.some((item) => item.id === id) && !window.confirm(`Overwrite existing animation "${id}"?`)) return;
  const fresh = {
    id,
    body: {},
    hat: { poses: {} },
    actions: { main: makeTrack([{ sprite: "Player" }], 120) },
  };
  state.animData = ensureAnimationData(fresh);
  state.animData.id = id;
  state.frameIndex = 0;
  state.selectedItem = { type: "body" };
  stopPlay();
  state.undoHistory = [JSON.parse(JSON.stringify(state.animData))];
  state.undoIndex = 0;
  syncTrackSelect("actions.main");
  syncControls();
  render();
  await doSave();
  await populateAnimSelectKeeping(id);
};
const addNewBodyClip = () => {
  if (!state.animData) return;
  const raw = window.prompt("New body clip id (e.g. swim). Not idle, walk, jump, or crouch.", "");
  if (raw === null) return;
  const clipId = sanitizeBodyClipId(raw);
  if (!clipId) {
    flashError("Invalid body clip id");
    return;
  }
  if (CORE_BODY_CLIPS.includes(clipId)) {
    flashError("That name is reserved for the default body clips");
    return;
  }
  if (state.animData.body[clipId]) {
    flashError("A body clip with that id already exists");
    return;
  }
  captureState();
  state.animData.body[clipId] = makeTrack([{ sprite: "Player" }], 120);
  ensureAnimationData(state.animData);
  syncTrackSelect(`body.${clipId}`);
  state.frameIndex = 0;
  state.selectedItem = { type: "body" };
  stopPlay();
  syncControls();
  render();
};
const addNewActionClip = () => {
  if (!state.animData) return;
  const raw = window.prompt("New action clip id (e.g. blockBreak)", "");
  if (raw === null) return;
  const clipId = sanitizeActionClipId(raw);
  if (!clipId) {
    flashError("Invalid action clip id (start with a letter, then letters/digits)");
    return;
  }
  if (state.animData.actions[clipId]) {
    flashError("An action clip with that id already exists");
    return;
  }
  captureState();
  state.animData.actions[clipId] = makeTrack([{ sprite: "PlayerPunch1" }], 75);
  state.animData.hat.poses.actions = state.animData.hat.poses.actions ?? {};
  state.animData.hat.poses.actions[clipId] = ensurePoseCount([], 1, makeHatPose);
  ensureAnimationData(state.animData);
  syncTrackSelect(`actions.${clipId}`);
  state.frameIndex = 0;
  state.selectedItem = { type: "body" };
  stopPlay();
  syncControls();
  render();
};
const doSave = async () => {
  if (!state.animData) return;
  elements.saveStatus.classList.remove("editor-save-status--saved", "editor-save-status--error");
  elements.saveStatus.textContent = "Saving…";
  try {
    const res = await fetch("/api/save", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ id: state.animData.id, data: state.animData }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    elements.saveStatus.classList.add("editor-save-status--saved");
    elements.saveStatus.textContent = "Saved";
    setTimeout(() => {
      elements.saveStatus.textContent = "";
      elements.saveStatus.classList.remove("editor-save-status--saved");
    }, 2000);
  } catch (error) {
    elements.saveStatus.classList.add("editor-save-status--error");
    elements.saveStatus.textContent = "Error";
    console.error(error);
  }
};
document.getElementById("btn-save").onclick = doSave;
const loadAnimation = async (id) => {
  if (!id) {
    state.animData = null;
    syncTrackSelect();
    syncControls();
    render();
    return;
  }
  const response = await fetch(`/api/animations/${id}`);
  if (!response.ok) {
    flashError(`Could not load "${id}"`);
    return;
  }
  state.animData = ensureAnimationData(await response.json());
  state.frameIndex = 0;
  state.selectedItem = { type: "body" };
  stopPlay();
  state.undoHistory = [JSON.parse(JSON.stringify(state.animData))];
  state.undoIndex = 0;
  syncTrackSelect();
  syncControls();
  render();
};
document.getElementById("btn-new-anim").onclick = createNewAnimation;
document.getElementById("btn-new-body-clip").onclick = addNewBodyClip;
document.getElementById("btn-new-action-clip").onclick = addNewActionClip;
elements.animSelect.onchange = () => loadAnimation(elements.animSelect.value);
const bootstrapAnimList = async () => {
  const list = await fetchAnimList();
  elements.animSelect.innerHTML = '<option value="">Select…</option>';
  list.forEach(({ id }) => {
    const option = document.createElement("option");
    option.value = id;
    option.textContent = id;
    elements.animSelect.appendChild(option);
  });
  if (list.length === 1) {
    elements.animSelect.value = list[0].id;
    await loadAnimation(list[0].id);
  }
};
bootstrapAnimList();
fetch("/api/assets")
  .then((response) => response.json())
  .then((list) => {
    state.allAssets = list;
    renderAssets("");
  });
window.addEventListener("keydown", (event) => {
  const isInputField = event.target.tagName === "INPUT" || event.target.tagName === "TEXTAREA" || event.target.tagName === "SELECT";
  if ((event.ctrlKey || event.metaKey) && event.key === "z" && !isInputField) {
    event.preventDefault();
    performUndo();
  }
  if ((event.ctrlKey || event.metaKey) && event.key === "c" && !isInputField) {
    if (state.selectedItem.type === "hitbox") {
      event.preventDefault();
      copySelectedHitbox();
    }
  }
  if ((event.ctrlKey || event.metaKey) && event.key === "v" && !isInputField) {
    if (state.copiedHitbox) {
      event.preventDefault();
      pasteHitbox();
    }
  }
});
</script>
</body>
</html>
